<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Victor Gabriel - Links</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <header>
        <h1>Victor Gabriel | Dev Back-end</h1>
    </header>

    <main>
        <div class="card">
            <img src="./assets/images.jpg" alt="Instagram" class="instagram">
            <button onclick="instagram(event)"><strong>Instagram</strong></button>
        </div>
        <div class="card">
            <img src="./assets/whatsapp.webp" alt="WhatsApp" class="whatsapp">
            <button onclick="whatsapp(event)"><strong>WhatsApp</strong></button>
        </div>
        <div class="card">
            <img src="./assets/perfil.jpg" alt="Portifólio" class="portifolio">
            <button onclick="portifolio(event)"><strong>Portifólio</strong></button>
        </div>
        <div class="card">
            <img src="./assets/github.png" alt="Github" class="github">
            <button onclick="github(event)"><strong>Github</strong></button>
        </div>
    </main>
</body>
<script src="index.js"></script>
</html>
